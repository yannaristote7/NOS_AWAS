{% extends 'blog/base.html' %}

{% block content %}
<div class="vh-100 d-flex justify-content-center align-items-center">
    <div class="card p-4 shadow" style="width: 400px;">
        <h3 class="text-center mb-3">Se connecter</h3>
        <form method="post" autocomplete="off">
            {% csrf_token %}
            <div class="mb-3">
                <label for="id_username" class="form-label">Nom d'utilisateur</label>
                <input type="text" name="username" autofocus class="form-control" required>
            </div>
            <div class="mb-3">
                <label for="id_password" class="form-label">Mot de passe</label>
                <input type="password" name="password"  autocomplete="new-password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Connexion</button>
        </form>
        <p class="mt-3 text-center">Pas encore inscrit ? <a href="{% url 'register' %}">Créer un compte</a></p>
    </div>
</div>
{% endblock %}
